services:
  backend:
    build: ./backend
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/taskdb

  mongo:
    image: mongo
    restart: always
    volumes:
      - mongo-data:/data/db

  test:
    build: ./tests
    command: npm test
    depends_on:
      - backend
      - mongo

volumes:
  mongo-data: